<div [formGroup]="formGroup">
  <mat-form-field class="full-width" [ngClass]="(isDisabled)?'disabilitar':'habilitar'" [style]="style" 
      appearance="outline">
      <mat-label>{{titulo}}</mat-label>
      <input  matInput
              [mask]="maskTexto"
              [class]="class"
              [placeholder]="titulo"
              [name]="controlName"
              [maxlength]="maxLength"
              (blur)="ngBlur(pai)"
              [formControlName]="controlName"
              [readonly]="isDisabled"
              id="controlName">
   
    <mat-error *ngIf="validacao.hasErrorValidar(formControl, 'required')">Campo obrigatÃ³rio</mat-error>
    <mat-error *ngIf="validacao.hasErrorValidar(formControl, 'minlength')">
      {{titulo}} precisa ter no mÃ­nimo {{validacao.lengthValidar(formControl, 'minlength')}} caracteres</mat-error>
    <mat-error *ngIf="validacao.hasErrorValidar(formControl, 'maxlength')">
      {{titulo}} pode ter no mÃ¡ximo {{validacao.lengthValidar(formControl, 'maxlength')}} caracteres
    </mat-error>
    <mat-error *ngIf="validacao.hasErrorValidar(formControl, 'cnpjcpfInvalido')">
      CPF/CNPJ inválido.</mat-error>
  </mat-form-field>     
</div>
